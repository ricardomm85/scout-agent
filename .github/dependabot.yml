version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/site"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    # Group all npm bumps into a single weekly PR instead of one per dependency.
    groups:
      npm:
        patterns: ["*"]
    ignore:
      # Stay on Astro 5: the Astro Micro theme targets v5. Major bumps of Astro
      # and its ecosystem integrations (mdx, rss, sitemap, check, pagefind)
      # require/track Astro 6 and would break the build. Keep minor/patch.
      - dependency-name: "astro"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@astrojs/*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "astro-pagefind"
        update-types: ["version-update:semver-major"]
