version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/site"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    # Group all npm bumps into a single weekly PR instead of one per dependency.
    groups:
      npm:
        patterns: ["*"]
    ignore:
      # On Astro 6. Ecosystem majors are done by hand, not by bot: the 5->6
      # bump needed a vite override and astro-pagefind had to stay on v1 (its v2
      # rewrites the search UI). Let Dependabot ship minor/patch + security;
      # major upgrades stay a deliberate, tested migration.
      - dependency-name: "astro"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@astrojs/*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "astro-pagefind"
        update-types: ["version-update:semver-major"]
